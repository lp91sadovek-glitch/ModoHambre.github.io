<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>consulta</title>
</head>

<link rel="stylesheet" href="style/contactos.css">
<body>

    <!-- MENÚ FLOTANTE REDES SOCIALES -->
    <div class="floating-menu">
        <a href="https://www.instagram.com" target="_blank" class="social-btn instagram" aria-label="Instagram">
            <span>📷</span>
            <span>Instagram</span>
        </a>
        <a href="https://www.tiktok.com" target="_blank" class="social-btn tiktok" aria-label="TikTok">
            <span>🎵</span>
            <span>TikTok</span>
        </a>
        <a href="https://www.facebook.com" target="_blank" class="social-btn facebook" aria-label="Facebook">
            <span>👍</span>
            <span>Facebook</span>
        </a>
    </div>

    <h1>consulta</h1>

    <form>

        <div class="nombre">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><required>
        </div>
       
        <div class="correo">
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email"><required> 
        </div>

        <div class="telefono">
        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono" name="telefono"><required>
        </div>

        <div class="mensaje">
        <label for="mensaje">Mensaje</label>
        <textarea 
        id="mensaje" 
        name="mensaje" 
        rows="4" 
        cols="50" 
        placeholder="Escribe tu mensaje aquí...">
    </textarea>
        </div>

        <div class="boton">
        <button type="submit">Enviar</button>
        </div>

    </form>

      <a href="index.html" class="boton">Volver a la página principal</a>

</body>
</html>
